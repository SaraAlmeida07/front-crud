<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS CRUD Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Importando Axios para facilitar as requisições HTTP -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="styles/reset.css" rel="stylesheet">
    <link href="styles/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="title text-white text-center py-3 mb-4">
        <h2>JS CRUD Project</h2>
    </div>

    <div class="container">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Users</h5>
                <div id="users-container" class="row g-3">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 id="form-title" class="card-title">Create User</h5>
                <form id="create-user-form" class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Age</label>
                        <input type="number" id="age" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button type="submit" id="submit-btn" class="btn btn-create  flex-grow-1">Create</button>
                        <button type="button" id="cancel-btn" class="btn btn-outline-secondary flex-grow-1"
                            style="display: none;" onclick="cancelarEdicao()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="scripts/api/create.js"></script>
    <script src="scripts/api/update.js"></script>
    <script src="scripts/api/delete.js"></script>
    <script src="scripts/api/read.js"></script>
    <script src="scripts/dom/render.js"></script>

    <script src="app.js"></script>
</body>

</html>
