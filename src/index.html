<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS CRUD Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="bg-dark text-white text-center py-3 mb-4">
        <h2>JS CRUD Project</h2>
    </div>

    <div class="container">
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Users</h5>
                <div id="users-container" class="row g-3">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Create User</h5>
                <form id="create-user-form" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Age</label>
                        <input type="number" id="age" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-dark w-100">Create</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <div>
        <button class="btn btn-primary"> teste </button>
    </div>

    <script src="script.js"></script>
</body>

</html>
